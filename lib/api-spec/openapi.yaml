  # ============================================================
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # --- AUTH ---
    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      required: [user, token]
      properties:
        user:
          $ref: "#/components/schemas/User"
        token:
          type: string

    User:
      type: object
      required: [id, name, email, role, active]
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        role:
          type: string
        active:
          type: boolean
        lastLogin:
          type: ["string", "null"]
        createdAt:
          type: string

    UserInput:
      type: object
      required: [name, email, password, role]
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
        active:
          type: boolean

    UserUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        role:
          type: string
        active:
          type: boolean

    # --- DASHBOARD ---
    DashboardStats:
      type: object
      required: [totalProductsInStock, totalSalesToday, totalOrdersPending, totalOverdueInvoices, totalCustomers, lowStockCount, ptaPendingCount, unreadChats]
      properties:
        totalProductsInStock:
          type: integer
        totalSalesToday:
          type: number
        totalOrdersPending:
          type: integer
        totalOverdueInvoices:
          type: number
        totalCustomers:
          type: integer
        lowStockCount:
          type: integer
        ptaPendingCount:
          type: integer
        unreadChats:
          type: integer
        totalInvoicesOutstanding:
          type: number
        totalInvoicesOverdue:
          type: number

    RevenuePoint:
      type: object
      required: [label, revenue]
      properties:
        label:
          type: string
        revenue:
          type: number
        orders:
          type: integer

    RecentSale:
      type: object
      required: [id, invoiceNumber, customerName, amount, status, date]
      properties:
        id:
          type: integer
        invoiceNumber:
          type: string
        customerName:
          type: string
        amount:
          type: number
        status:
          type: string
        date:
          type: string

    # --- INVENTORY ---
    InventoryItem:
      type: object
      required: [id, imei, productName, brandName, modelName, status, ptaStatus, landedCost, sellingPrice, purchaseDate, warrantyExpiry]
      properties:
        id:
          type: integer
        imei:
          type: string
        deviceId:
          type: ["string", "null"]
        iccid:
          type: ["string", "null"]
        msisdn:
          type: ["string", "null"]
        productName:
          type: string
        brandName:
          type: string
        modelName:
          type: string
        brandId:
          type: integer
        modelId:
          type: integer
        categoryId:
          type: ["integer", "null"]
        vendorId:
          type: ["integer", "null"]
        status:
          type: string
          enum: [unassigned, in_stock, reserved, sold, returned, replaced, damaged]
        ptaStatus:
          type: string
          enum: [approved, pending]
        psid:
          type: ["string", "null"]
        landedCost:
          type: number
        sellingPrice:
          type: number
        purchaseDate:
          type: string
        warrantyExpiry:
          type: string
        supplierInvoiceNumber:
          type: ["string", "null"]
        grnNumber:
          type: ["string", "null"]
        notes:
          type: ["string", "null"]
        createdAt:
          type: string

    InventoryItemInput:
      type: object
      required: [imei, brandId, modelId, landedCost, sellingPrice, purchaseDate, ptaStatus]
      properties:
        imei:
          type: string
        deviceId:
          type: string
        iccid:
          type: string
        msisdn:
          type: string
        brandId:
          type: integer
        modelId:
          type: integer
        categoryId:
          type: integer
        vendorId:
          type: integer
        ptaStatus:
          type: string
        psid:
          type: string
        landedCost:
          type: number
        sellingPrice:
          type: number
        purchaseDate:
          type: string
        warrantyDays:
          type: integer
        supplierInvoiceNumber:
          type: string
        notes:
          type: string

    InventoryItemUpdate:
      type: object
      properties:
        status:
          type: string
        ptaStatus:
          type: string
        psid:
          type: string
        sellingPrice:
          type: number
        notes:
          type: string

    InventoryListResponse:
      type: object
      required: [items, total, page, limit]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/InventoryItem"
        total:
          type: integer
        page:
          type: integer
        limit:
          type: integer

    BulkInventoryInput:
      type: object
      required: [brandId, modelId, imeis, landedCost, sellingPrice, purchaseDate, ptaStatus]
      properties:
        brandId:
          type: integer
        modelId:
          type: integer
        imeis:
          type: array
          items:
            type: string
        deviceIds:
          type: array
          items:
            type: string
        landedCost:
          type: number
        sellingPrice:
          type: number
        purchaseDate:
          type: string
        ptaStatus:
          type: string
        psid:
          type: string
        vendorId:
          type: integer

    BulkImportResult:
      type: object
      required: [imported, skipped, errors]
      properties:
        imported:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: string

    LowStockItem:
      type: object
      required: [productName, brandName, modelName, currentStock, reorderLevel]
      properties:
        productName:
          type: string
        brandName:
          type: string
        modelName:
          type: string
        currentStock:
          type: integer
        reorderLevel:
          type: integer
        deficit:
          type: integer

    # --- BRANDS ---
    Brand:
      type: object
      required: [id, name, active]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        deviceIdMandatory:
          type: boolean
        active:
          type: boolean
        modelsCount:
          type: integer
        createdAt:
          type: string

    BrandInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
        description:
          type: string
        deviceIdMandatory:
          type: boolean
        active:
          type: boolean

    BrandUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        deviceIdMandatory:
          type: boolean
        active:
          type: boolean

    # --- MODELS ---
    DeviceModel:
      type: object
      required: [id, brandId, name, active]
      properties:
        id:
          type: integer
        brandId:
          type: integer
        brandName:
          type: string
