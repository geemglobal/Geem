        grossProfit:
          type: number
        expenses:
          type: number
        courierCharges:
          type: number
        netProfit:
          type: number
        chartData:
          type: array
          items:
            $ref: "#/components/schemas/RevenuePoint"

    CustomerDue:
      type: object
      required: [customerId, customerName, customerMobile, totalInvoiced, totalPaid, balanceDue]
      properties:
        customerId:
          type: integer
        customerName:
          type: string
        customerMobile:
          type: string
        totalInvoiced:
          type: number
        totalPaid:
          type: number
        balanceDue:
          type: number

    # --- CHAT ---
    ChatSession:
      type: object
      required: [id, status, createdAt]
      properties:
        id:
          type: integer
        customerName:
          type: ["string", "null"]
        customerEmail:
          type: ["string", "null"]
        status:
          type: string
          enum: [open, waiting, assigned, closed]
        aiHandled:
          type: boolean
        unreadCount:
          type: integer
        lastMessage:
          type: ["string", "null"]
        createdAt:
          type: string

    ChatMessage:
      type: object
      required: [id, sessionId, role, content, createdAt]
      properties:
        id:
          type: integer
        sessionId:
          type: integer
        role:
          type: string
          enum: [customer, agent, ai, system]
        content:
          type: string
        createdAt:
          type: string

    ChatMessageInput:
      type: object
      required: [content]
      properties:
        content:
          type: string
        role:
          type: string

    # ============================================================
