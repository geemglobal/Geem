          application/json:
            schema:
              $ref: "#/components/schemas/DeviceModelInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceModel"

  /models/{id}:
    patch:
      operationId: updateModel
      tags: [models]
