<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 520" width="1440" height="520">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0f172a"/>
      <stop offset="60%"  stop-color="#111827"/>
      <stop offset="100%" stop-color="#1a0a0a"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="50%" r="45%">
      <stop offset="0%"   stop-color="#dc2626" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#dc2626" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="20%" r="40%">
      <stop offset="0%"   stop-color="#1d4ed8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#1d4ed8" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1440" height="520" fill="url(#bg)"/>
  <rect width="1440" height="520" fill="url(#glow1)"/>
  <rect width="1440" height="520" fill="url(#glow2)"/>

  <!-- Subtle grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.025" stroke-width="1">
    <line x1="0" y1="130" x2="1440" y2="130"/>
    <line x1="0" y1="260" x2="1440" y2="260"/>
    <line x1="0" y1="390" x2="1440" y2="390"/>
    <line x1="360" y1="0" x2="360" y2="520"/>
    <line x1="720" y1="0" x2="720" y2="520"/>
    <line x1="1080" y1="0" x2="1080" y2="520"/>
  </g>

  <!-- Large decorative G (background watermark) -->
  <text x="900" y="430" font-family="Georgia, serif" font-size="500" font-weight="700"
        fill="#dc2626" fill-opacity="0.04" text-anchor="middle" letter-spacing="-10">G</text>

  <!-- G icon box -->
  <rect x="80" y="140" width="72" height="72" rx="18" fill="#dc2626"/>
  <text x="116" y="197" font-family="Georgia, serif" font-size="48" font-weight="700"
        fill="#ffffff" text-anchor="middle" letter-spacing="-1">G</text>

  <!-- Brand wordmark -->
  <text x="168" y="195" font-family="'Inter', Helvetica, Arial, sans-serif" font-size="52"
        font-weight="800" fill="#ffffff" letter-spacing="-1">eem</text>

  <!-- Tagline -->
  <text x="80" y="244" font-family="'Inter', Helvetica, Arial, sans-serif" font-size="16"
        font-weight="400" fill="#9ca3af" letter-spacing="0.5">Pakistan's Specialist Security &amp; Surveillance Equipment Supplier</text>

  <!-- Accent bar -->
  <rect x="80" y="270" width="60" height="3" rx="2" fill="#dc2626"/>
</svg>
